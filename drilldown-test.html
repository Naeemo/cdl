<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDL 数据下钻功能测试</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #8b92b4;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .chart-title {
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chart-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: #5470c6;
            border-radius: 2px;
        }
        
        #main-chart {
            width: 100%;
            height: 400px;
        }
        
        /* 面包屑导航 */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            flex-wrap: wrap;
        }
        
        .breadcrumb-item {
            color: #8b92b4;
            font-size: 14px;
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .breadcrumb-item:hover {
            color: #5470c6;
        }
        
        .breadcrumb-item.active {
            color: #fff;
            font-weight: 500;
            cursor: default;
        }
        
        .breadcrumb-separator {
            color: #5a5f7a;
        }
        
        /* 详情面板 */
        .detail-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            min-width: 400px;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
        }
        
        .detail-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .detail-title {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
        }
        
        .detail-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 18px;
        }
        
        .detail-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }
        
        .detail-content {
            color: #b8bed4;
        }
        
        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .detail-item:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            font-size: 14px;
            color: #8b92b4;
        }
        
        .detail-value {
            font-size: 16px;
            color: #fff;
            font-weight: 500;
        }
        
        .detail-value.highlight {
            color: #91cc75;
        }
        
        /* 遮罩层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 999;
        }
        
        .overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .stat-label {
            color: #8b92b4;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            color: #fff;
            font-size: 24px;
            font-weight: 600;
        }
        
        .stat-change {
            font-size: 12px;
            margin-top: 5px;
        }
        
        .stat-change.positive {
            color: #91cc75;
        }
        
        .stat-change.negative {
            color: #ee6666;
        }
        
        /* 提示信息 */
        .tooltip-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(84, 112, 198, 0.9);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .tooltip-hint.active {
            opacity: 1;
        }
        
        /* 子图表容器 */
        .sub-chart-container {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        #sub-chart {
            width: 100%;
            height: 300px;
        }
        
        .drill-hint {
            color: #5a5f7a;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 CDL 数据下钻功能测试</h1>
        <p class="subtitle">点击图表元素查看下钻详情 | Drill-down Demo</p>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">总销售额</div>
                <div class="stat-value" id="total-sales">¥2,450,000</div>
                <div class="stat-change positive">↑ 23.5% 较上月</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">转化漏斗</div>
                <div class="stat-value" id="conversion-rate">8.0%</div>
                <div class="stat-change positive">↑ 2.1% 较上周</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">活跃用户数</div>
                <div class="stat-value" id="active-users">12,580</div>
                <div class="stat-change negative">↓ 5.3% 较昨日</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">平均客单价</div>
                <div class="stat-value" id="avg-order">¥195</div>
                <div class="stat-change positive">↑ 8.7% 较上月</div>
            </div>
        </div>
        
        <!-- 主图表 -->
        <div class="chart-container">
            <div class="chart-title">销售数据分析（支持下钻）</div>
            
            <!-- 面包屑导航 -->
            <div class="breadcrumb" id="breadcrumb">
                <span class="breadcrumb-item active" data-level="0">全部数据</span>
            </div>
            
            <div id="main-chart"></div>
            <p class="drill-hint">💡 提示：点击图表中的柱形或扇区可查看详细数据</p>
        </div>
        
        <!-- 子图表（下钻后显示） -->
        <div class="sub-chart-container" id="sub-chart-wrapper" style="display: none;">
            <div class="chart-title">详细数据 breakdown</div>
            <div id="sub-chart"></div>
        </div>
    </div>
    
    <!-- 详情面板 -->
    <div class="overlay" id="overlay"></div>
    <div class="detail-panel" id="detail-panel">
        <div class="detail-header">
            <h3 class="detail-title" id="detail-title">数据详情</h3>
            <button class="detail-close" id="detail-close">×</button>
        </div>
        <div class="detail-content" id="detail-content">
            <!-- 动态填充 -->
        </div>
    </div>
    
    <!-- 提示信息 -->
    <div class="tooltip-hint" id="tooltip-hint">点击图表元素查看详情</div>

    <script>
        // ============================================
        // CDL 编译器模拟（简化版）
        // ============================================
        
        // 模拟 CDL 编译结果
        const cdlData = {
            data: [
                {
                    name: 'SalesData',
                    query: `category,subcategory,product,sales,quantity,profit
电子产品,手机,iPhone 15,450000,500,90000
电子产品,手机,Galaxy S24,320000,400,64000
电子产品,电脑,MacBook Pro,280000,200,56000
电子产品,电脑,ThinkPad X1,190000,150,38000
服装,男装,T恤,85000,1000,17000
服装,男装,衬衫,65000,800,13000
服装,女装,连衣裙,120000,600,36000
服装,女装,外套,95000,400,28500
家居,家具,沙发,180000,60,36000
家居,家具,餐桌,120000,80,24000
家居,装饰,灯具,75000,300,22500
家居,装饰,地毯,45000,200,9000`
                },
                {
                    name: 'FunnelData',
                    query: `stage,count,conversion
访问,10000,100
点击,5000,50
加入购物车,2000,20
结算,1000,10
支付,800,8`
                }
            ],
            charts: [
                {
                    name: '销售品类分布',
                    chartType: 'pie',
                    dataSources: ['SalesData'],
                    x: 'category',
                    y: 'sales',
                    group: null,
                    hints: {
                        title: '销售品类分布（点击下钻）'
                    },
                    interaction: {
                        drillDown: {
                            enabled: true,
                            field: 'subcategory',
                            maxLevels: 3
                        },
                        tooltip: 'shared'
                    }
                },
                {
                    name: '转化漏斗',
                    chartType: 'funnel',
                    dataSources: ['FunnelData'],
                    x: 'stage',
                    y: 'count',
                    hints: {
                        title: '转化漏斗分析'
                    },
                    interaction: {
                        drillDown: {
                            enabled: true
                        }
                    }
                }
            ]
        };
        
        // ============================================
        // 数据解析工具
        // ============================================
        
        function parseCSV(query) {
            const lines = query.split('\n').map(l => l.trim()).filter(l => l);
            if (lines.length === 0) return { headers: [], rows: [] };
            
            const headers = lines[0].split(',').map(h => h.trim());
            const rows = lines.slice(1).map(line => {
                const values = line.split(',').map(v => v.trim());
                const row = {};
                headers.forEach((h, i) => {
                    const val = values[i] ?? '';
                    const num = Number(val);
                    row[h] = isNaN(num) ? val : num;
                });
                return row;
            });
            
            return { headers, rows };
        }
        
        // ============================================
        // 下钻状态管理
        // ============================================
        
        const drillState = {
            currentLevel: 0,
            maxLevels: 3,
            breadcrumbs: ['全部数据'],
            currentFilter: null,
            filterValue: null
        };
        
        // 原始数据
        let originalData = [];
        let filteredData = [];
        
        // ============================================
        // ECharts 配置生成
        // ============================================
        
        function generatePieOption(data, title) {
            const grouped = {};
            data.forEach(row => {
                const key = drillState.currentLevel === 0 ? row.category : 
                           drillState.currentLevel === 1 ? row.subcategory : row.product;
                if (!grouped[key]) grouped[key] = 0;
                grouped[key] += row.sales;
            });
            
            const chartData = Object.entries(grouped)
                .map(([name, value]) => ({ name, value }))
                .sort((a, b) => b.value - a.value);
            
            return {
                backgroundColor: 'transparent',
                title: {
                    text: title,
                    left: 'center',
                    top: 10,
                    textStyle: { color: '#fff', fontSize: 16 }
                },
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(30, 30, 50, 0.95)',
                    borderColor: 'rgba(255, 255, 255, 0.1)',
                    textStyle: { color: '#fff' },
                    formatter: '{b}: ¥{c} ({d}%)'
                },
                legend: {
                    orient: 'vertical',
                    left: 'left',
                    top: 'center',
                    textStyle: { color: '#b8bed4' }
                },
                series: [{
                    name: '销售额',
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['60%', '50%'],
                    avoidLabelOverlap: false,
                    itemStyle: {
                        borderRadius: 10,
                        borderColor: '#1a1a2e',
                        borderWidth: 2
                    },
                    label: {
                        show: true,
                        color: '#fff',
                        formatter: '{b}\n¥{c}'
                    },
                    emphasis: {
                        label: {
                            show: true,
                            fontSize: 16,
                            fontWeight: 'bold'
                        },
                        itemStyle: {
                            shadowBlur: 20,
                            shadowColor: 'rgba(0,0,0,0.5)'
                        }
                    },
                    data: chartData,
                    cursor: 'pointer'
                }]
            };
        }
        
        function generateBarOption(data, title) {
            const grouped = {};
            data.forEach(row => {
                const key = drillState.currentLevel === 0 ? row.category : row.subcategory;
                if (!grouped[key]) {
                    grouped[key] = { sales: 0, quantity: 0, profit: 0 };
                }
                grouped[key].sales += row.sales;
                grouped[key].quantity += row.quantity;
                grouped[key].profit += row.profit;
            });
            
            const categories = Object.keys(grouped);
            const values = categories.map(k => grouped[k].sales);
            
            return {
                backgroundColor: 'transparent',
                title: {
                    text: title,
                    left: 'center',
                    top: 10,
                    textStyle: { color: '#fff', fontSize: 16 }
                },
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(30, 30, 50, 0.95)',
                    borderColor: 'rgba(255, 255, 255, 0.1)',
                    textStyle: { color: '#fff' },
                    axisPointer: { type: 'shadow' },
                    formatter: function(params) {
                        const key = params[0].name;
                        const item = grouped[key];
                        return `<div style="padding: 10px;">
                            <div style="font-weight: bold; margin-bottom: 8px; color: #fff;">${key}</div>
                            <div style="color: #91cc75;">销售额: ¥${item.sales.toLocaleString()}</div>
                            <div style="color: #5470c6;">销量: ${item.quantity.toLocaleString()}件</div>
                            <div style="color: #fac858;">利润: ¥${item.profit.toLocaleString()}</div>
                        </div>`;
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: categories,
                    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.2)' } },
                    axisLabel: { color: '#b8bed4', rotate: 30 }
                },
                yAxis: {
                    type: 'value',
                    axisLine: { show: false },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
                    axisLabel: { 
                        color: '#8b92b4',
                        formatter: (value) => '¥' + (value / 1000) + 'k'
                    }
                },
                series: [{
                    name: '销售额',
                    type: 'bar',
                    data: values,
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#5470c6' },
                            { offset: 1, color: '#91cc75' }
                        ]),
                        borderRadius: [8, 8, 0, 0]
                    },
                    emphasis: {
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: '#91cc75' },
                                { offset: 1, color: '#5470c6' }
                            ])
                        }
                    },
                    cursor: 'pointer'
                }]
            };
        }
        
        function generateFunnelOption(data, title) {
            const rows = data.map(row => ({
                name: row.stage,
                value: row.count
            }));
            
            return {
                backgroundColor: 'transparent',
                title: {
                    text: title,
                    left: 'center',
                    top: 10,
                    textStyle: { color: '#fff', fontSize: 16 }
                },
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(30, 30, 50, 0.95)',
                    borderColor: 'rgba(255, 255, 255, 0.1)',
                    textStyle: { color: '#fff' },
                    formatter: '{b}: {c} ({d}%)'
                },
                series: [{
                    name: '漏斗',
                    type: 'funnel',
                    left: '10%',
                    top: 60,
                    bottom: 60,
                    width: '80%',
                    min: 0,
                    max: 10000,
                    minSize: '0%',
                    maxSize: '100%',
                    sort: 'descending',
                    gap: 2,
                    label: {
                        show: true,
                        position: 'inside',
                        color: '#fff',
                        formatter: '{b}\n{c}'
                    },
                    itemStyle: {
                        borderColor: '#1a1a2e',
                        borderWidth: 2
                    },
                    emphasis: {
                        label: { fontSize: 14, fontWeight: 'bold' }
                    },
                    data: rows,
                    cursor: 'pointer'
                }]
            };
        }
        
        // ============================================
        // 图表初始化与事件处理
        // ============================================
        
        let mainChart, subChart;
        
        function initCharts() {
            const chartDom = document.getElementById('main-chart');
            mainChart = echarts.init(chartDom);
            
            // 解析数据
            const salesData = cdlData.data.find(d => d.name === 'SalesData');
            const parsed = parseCSV(salesData.query);
            originalData = parsed.rows;
            filteredData = [...originalData];
            
            // 初始渲染 - 饼图
            renderChart();
            
            // 点击事件 - 下钻
            mainChart.on('click', handleChartClick);
            
            // 窗口大小变化时重新渲染
            window.addEventListener('resize', () => {
                mainChart.resize();
                if (subChart) subChart.resize();
            });
        }
        
        function renderChart() {
            let option;
            const titles = ['销售品类分布', '二级分类销售', '产品销售详情'];
            const currentTitle = titles[Math.min(drillState.currentLevel, titles.length - 1)];
            
            if (drillState.currentLevel === 0) {
                option = generatePieOption(filteredData, currentTitle);
            } else if (drillState.currentLevel === 1) {
                option = generateBarOption(filteredData, currentTitle);
            } else {
                option = generateBarOption(filteredData, currentTitle);
            }
            
            mainChart.setOption(option, true);
        }
        
        function handleChartClick(params) {
            if (drillState.currentLevel >= drillState.maxLevels - 1) {
                showDetailPanel(params);
                return;
            }
            
            const clickedName = params.name;
            drillState.currentLevel++;
            drillState.breadcrumbs.push(clickedName);
            
            // 过滤数据
            if (drillState.currentLevel === 1) {
                filteredData = originalData.filter(row => row.category === clickedName);
            } else if (drillState.currentLevel === 2) {
                filteredData = originalData.filter(row => row.subcategory === clickedName);
            }
            
            updateBreadcrumb();
            renderChart();
            showSubChart();
            
            // 显示提示
            showTooltip(`已下钻到: ${clickedName}`);
        }
        
        function updateBreadcrumb() {
            const breadcrumbEl = document.getElementById('breadcrumb');
            breadcrumbEl.innerHTML = drillState.breadcrumbs.map((item, index) => {
                const isActive = index === drillState.breadcrumbs.length - 1;
                const separator = index > 0 ? '<span class="breadcrumb-separator">/</span>' : '';
                return `${separator}<span class="breadcrumb-item ${isActive ? 'active' : ''}" data-level="${index}">${item}</span>`;
            }).join('');
            
            // 添加点击事件
            breadcrumbEl.querySelectorAll('.breadcrumb-item:not(.active)').forEach(item => {
                item.addEventListener('click', () => navigateToLevel(parseInt(item.dataset.level)));
            });
        }
        
        function navigateToLevel(level) {
            drillState.currentLevel = level;
            drillState.breadcrumbs = drillState.breadcrumbs.slice(0, level + 1);
            
            // 恢复数据过滤
            if (level === 0) {
                filteredData = [...originalData];
            } else if (level === 1) {
                const category = drillState.breadcrumbs[1];
                filteredData = originalData.filter(row => row.category === category);
            }
            
            updateBreadcrumb();
            renderChart();
            
            if (level === 0) {
                hideSubChart();
            }
        }
        
        function showSubChart() {
            const wrapper = document.getElementById('sub-chart-wrapper');
            wrapper.style.display = 'block';
            
            if (!subChart) {
                subChart = echarts.init(document.getElementById('sub-chart'));
            }
            
            // 子图表显示详细数据
            const subOption = generateSubChartOption();
            subChart.setOption(subOption);
        }
        
        function hideSubChart() {
            document.getElementById('sub-chart-wrapper').style.display = 'none';
        }
        
        function generateSubChartOption() {
            // 计算统计数据
            const totalSales = filteredData.reduce((sum, row) => sum + row.sales, 0);
            const totalProfit = filteredData.reduce((sum, row) => sum + row.profit, 0);
            const totalQuantity = filteredData.reduce((sum, row) => sum + row.quantity, 0);
            
            // 更新统计卡片
            document.getElementById('total-sales').textContent = '¥' + totalSales.toLocaleString();
            document.getElementById('avg-order').textContent = '¥' + Math.round(totalSales / totalQuantity);
            
            // 子图表：利润分析
            const categories = filteredData.map(row => row.subcategory || row.product);
            const profits = filteredData.map(row => row.profit);
            
            return {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(30, 30, 50, 0.95)',
                    borderColor: 'rgba(255, 255, 255, 0.1)',
                    textStyle: { color: '#fff' }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: categories,
                    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.2)' } },
                    axisLabel: { color: '#b8bed4', rotate: 30 }
                },
                yAxis: {
                    type: 'value',
                    axisLine: { show: false },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
                    axisLabel: { color: '#8b92b4' }
                },
                series: [{
                    name: '利润',
                    type: 'bar',
                    data: profits,
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#fac858' },
                            { offset: 1, color: '#ee6666' }
                        ]),
                        borderRadius: [8, 8, 0, 0]
                    }
                }]
            };
        }
        
        // ============================================
        // 详情面板
        // ============================================
        
        function showDetailPanel(params) {
            const panel = document.getElementById('detail-panel');
            const overlay = document.getElementById('overlay');
            const title = document.getElementById('detail-title');
            const content = document.getElementById('detail-content');
            
            title.textContent = params.name + ' - 详细数据';
            
            // 找到对应的数据
            const row = filteredData.find(r => 
                (r.product === params.name) || 
                (r.subcategory === params.name) || 
                (r.category === params.name)
            ) || filteredData[0];
            
            if (row) {
                const profitRate = ((row.profit / row.sales) * 100).toFixed(1);
                content.innerHTML = `
                    <div class="detail-item">
                        <span class="detail-label">产品/分类</span>
                        <span class="detail-value">${row.product || row.subcategory || row.category}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">销售额</span>
                        <span class="detail-value highlight">¥${row.sales?.toLocaleString() || '-'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">销量</span>
                        <span class="detail-value">${row.quantity?.toLocaleString() || '-'} 件</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">利润</span>
                        <span class="detail-value highlight">¥${row.profit?.toLocaleString() || '-'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">利润率</span>
                        <span class="detail-value">${profitRate}%</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">所属分类</span>
                        <span class="detail-value">${row.category} / ${row.subcategory || '-'}</span>
                    </div>
                `;
            }
            
            panel.classList.add('active');
            overlay.classList.add('active');
        }
        
        function closeDetailPanel() {
            document.getElementById('detail-panel').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }
        
        function showTooltip(message) {
            const tooltip = document.getElementById('tooltip-hint');
            tooltip.textContent = message;
            tooltip.classList.add('active');
            setTimeout(() => tooltip.classList.remove('active'), 2000);
        }
        
        // ============================================
        // 事件绑定
        // ============================================
        
        document.getElementById('detail-close').addEventListener('click', closeDetailPanel);
        document.getElementById('overlay').addEventListener('click', closeDetailPanel);
        
        // ESC键关闭面板
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeDetailPanel();
        });
        
        // ============================================
        // 初始化
        // ============================================
        
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            updateBreadcrumb();
        });
    </script>
</body>
</html>
