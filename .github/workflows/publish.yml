name: Publish to NPM

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'

    - name: Configure npm authentication
      run: |
        echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
        npm whoami
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Build and publish packages
      run: |
        set -e
        echo "Publishing CDL packages to NPM..."
        
        # 检查包是否已存在（带超时）
        check_package() {
          local pkg=$1
          local ver=$2
          timeout 15 npm info "$pkg@$ver" version 2>/dev/null || echo "NOT_FOUND"
        }
        
        # 发布 core
        CORE_VER=$(node -p "require('./packages/core/package.json').version")
        echo "📦 @naeemo/cdl-core@$CORE_VER"
        if [ "$(check_package '@naeemo/cdl-core' $CORE_VER)" != "$CORE_VER" ]; then
          cd packages/core
          npm ci 2>/dev/null || npm install
          npm run build
          npm publish --access public
          cd ../..
          echo "  ✅ Published"
        else
          echo "  ⚠️ Already exists, skipping"
        fi
        
        # 发布 react
        REACT_VER=$(node -p "require('./packages/react/package.json').version")
        echo "📦 @naeemo/cdl-react@$REACT_VER"
        if [ "$(check_package '@naeemo/cdl-react' $REACT_VER)" != "$REACT_VER" ]; then
          cd packages/react
          npm ci 2>/dev/null || npm install
          npm run build
          npm publish --access public
          cd ../..
          echo "  ✅ Published"
        else
          echo "  ⚠️ Already exists, skipping"
        fi
        
        # 发布 vue
        VUE_VER=$(node -p "require('./packages/vue/package.json').version")
        echo "📦 @naeemo/cdl-vue@$VUE_VER"
        if [ "$(check_package '@naeemo/cdl-vue' $VUE_VER)" != "$VUE_VER" ]; then
          cd packages/vue
          npm ci 2>/dev/null || npm install
          npm run build
          npm publish --access public
          cd ../..
          echo "  ✅ Published"
        else
          echo "  ⚠️ Already exists, skipping"
        fi
        
        # 发布 ai
        AI_VER=$(node -p "require('./packages/ai/package.json').version")
        echo "📦 @naeemo/cdl-ai@$AI_VER"
        if [ "$(check_package '@naeemo/cdl-ai' $AI_VER)" != "$AI_VER" ]; then
          cd packages/ai
          npm ci 2>/dev/null || npm install
          npm run build
          npm publish --access public
          cd ../..
          echo "  ✅ Published"
        else
          echo "  ⚠️ Already exists, skipping"
        fi
        
        # 发布 cli
        CLI_VER=$(node -p "require('./packages/cli/package.json').version")
        echo "📦 @naeemo/cdl-cli@$CLI_VER"
        if [ "$(check_package '@naeemo/cdl-cli' $CLI_VER)" != "$CLI_VER" ]; then
          cd packages/cli
          npm ci 2>/dev/null || npm install
          npm publish --access public
          cd ../..
          echo "  ✅ Published"
        else
          echo "  ⚠️ Already exists, skipping"
        fi
        
        # 发布 ssr
        SSR_VER=$(node -p "require('./packages/ssr/package.json').version")
        echo "📦 @naeemo/cdl-ssr@$SSR_VER"
        if [ "$(check_package '@naeemo/cdl-ssr' $SSR_VER)" != "$SSR_VER" ]; then
          cd packages/ssr
          npm ci 2>/dev/null || npm install
          npm publish --access public
          cd ../..
          echo "  ✅ Published"
        else
          echo "  ⚠️ Already exists, skipping"
        fi
        
        echo "✅ All packages processed!"
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Verify published packages
      run: |
        echo "Verifying published packages on NPM..."
        sleep 5
        for pkg in core react vue ai cli ssr; do
          VER=$(npm view "@naeemo/cdl-$pkg" version 2>/dev/null || echo "NOT_FOUND")
          echo "@naeemo/cdl-$pkg: $VER"
        done
