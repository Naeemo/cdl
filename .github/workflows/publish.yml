name: Publish to NPM

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'

    - name: Build and publish packages
      env:
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

        echo "Publishing CDL packages to NPM..."

        # Stage 1: Core package (must publish first)
        echo "📦 Publishing @naeemo/cdl-core..."
        cd packages/core
        npm install
        npm run build
        npm publish --access public
        cd ../..

        # Stage 2: Framework bindings
        echo "📦 Publishing @naeemo/cdl-react..."
        cd packages/react
        npm install
        npm run build
        npm publish --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-vue..."
        cd packages/vue
        npm install
        npm run build
        npm publish --access public
        cd ../..

        # Stage 3: Additional packages
        echo "📦 Publishing @naeemo/cdl-ai..."
        cd packages/ai
        npm install
        npm run build
        npm publish --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-cli..."
        cd packages/cli
        npm install
        npm publish --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-ssr..."
        cd packages/ssr
        npm install
        npm publish --access public
        cd ../..

        echo "✅ All packages published successfully!"

    - name: Create GitHub Release Comment
      if: github.event_name == 'release'
      run: |
        echo "🎉 CDL v${{ github.event.release.tag_name }} packages published to NPM!"
        echo ""
        echo "📦 Published packages:"
        echo "  - @naeemo/cdl-core"
        echo "  - @naeemo/cdl-react"
        echo "  - @naeemo/cdl-vue"
        echo "  - @naeemo/cdl-ai"
        echo "  - @naeemo/cdl-cli"
        echo "  - @naeemo/cdl-ssr"
        echo ""
        echo "🚀 Installation:"
        echo "  npm install @naeemo/cdl-core @naeemo/cdl-react"
        echo ""
        echo "📦 Package structure (v0.7):"
        echo "  - @naeemo/cdl-core: compiler + renderer + themes"
        echo "  - @naeemo/cdl-react: React components + dynamic charts"
        echo "  - @naeemo/cdl-vue: Vue components + dynamic charts"