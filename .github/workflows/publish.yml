name: Publish to NPM

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'

    - name: Build and publish packages
      env:
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

        echo "Publishing CDL packages to NPM..."

        # Stage 1: Core package (must publish first)
        echo "📦 Publishing @cdl/core..."
        cd packages/core
        npm install
        npm run build
        npm publish --access public
        cd ../..

        # Stage 2: Framework bindings
        echo "📦 Publishing @cdl/react..."
        cd packages/react-combined
        npm install
        npm run build
        npm publish --access public
        cd ../..

        echo "📦 Publishing @cdl/vue..."
        cd packages/vue-combined
        npm install
        npm run build
        npm publish --access public
        cd ../..

        # Stage 3: Additional packages
        echo "📦 Publishing @cdl/ai..."
        cd packages/ai
        npm install
        npm run build
        npm publish --access public
        cd ../..

        echo "📦 Publishing @cdl/cli..."
        cd packages/cli
        npm install
        npm publish --access public
        cd ../..

        echo "📦 Publishing @cdl/ssr..."
        cd packages/ssr
        npm install
        npm publish --access public
        cd ../..

        echo "✅ All packages published successfully!"

    - name: Create GitHub Release Comment
      if: github.event_name == 'release'
      run: |
        echo "🎉 CDL v${{ github.event.release.tag_name }} packages published to NPM!"
        echo ""
        echo "📦 Published packages:"
        echo "  - @cdl/core"
        echo "  - @cdl/react"
        echo "  - @cdl/vue"
        echo "  - @cdl/ai"
        echo "  - @cdl/cli"
        echo "  - @cdl/ssr"
        echo ""
        echo "🚀 Installation:"
        echo "  npm install @cdl/core @cdl/react"
        echo ""
        echo "📦 New package structure (v0.7):"
        echo "  - @cdl/core: compiler + renderer + themes"
        echo "  - @cdl/react: React components + dynamic charts"
        echo "  - @cdl/vue: Vue components + dynamic charts"
        echo ""
        echo "⚠️  Migration from v0.6:"
        echo "  - @naeemo/cdl-compiler → @cdl/core"
        echo "  - @naeemo/cdl-renderer-echarts → @cdl/core"
        echo "  - @naeemo/cdl-react → @cdl/react"
        echo "  - @naeemo/cdl-vue → @cdl/vue"