name: Publish to NPM

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'

    - name: Build and publish packages
      env:
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

        echo "Publishing CDL packages to NPM..."

        # Stage 1: Core packages
        echo "📦 Publishing @naeemo/cdl-compiler..."
        cd packages/compiler
        npm install
        npm run build
        npm publish --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-renderer-echarts..."
        cd packages/renderer
        npm install
        npm run build
        npm publish --access public
        cd ../..

        # Stage 2: Packages that depend on core
        echo "📦 Publishing @naeemo/cdl-ai..."
        cd packages/ai
        npm install
        npm run build
        npm publish --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-ssr..."
        cd packages/ssr
        npm install
        npm publish --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-cli..."
        cd packages/cli
        npm install
        npm publish --access public
        cd ../..

        # Stage 3: Remaining packages
        echo "📦 Publishing @naeemo/cdl-react..."
        cd packages/react
        npm install
        npm run build
        npm publish --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-vue..."
        cd packages/vue
        npm install
        npm run build
        npm publish --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-templates..."
        cd packages/templates
        npm install
        npm publish --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-themes..."
        cd packages/themes
        npm install
        npm run build
        npm publish --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-renderer-canvas..."
        cd packages/renderer-canvas
        npm install
        npm publish --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-renderer-d3..."
        cd packages/renderer-d3
        npm install
        npm run build
        npm publish --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-vscode..."
        cd packages/vscode-extension
        npm install
        npm run build 2>/dev/null || echo "No build script, skipping"
        npm publish --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-integration-test..."
        cd packages/integration-test
        npm install
        npm publish --access public
        cd ../..

        echo "✅ All packages published successfully!"

    - name: Create GitHub Release Comment
      if: github.event_name == 'release'
      run: |
        echo "🎉 CDL v${{ github.event.release.tag_name }} packages published to NPM!"
        echo ""
        echo "📦 Published packages:"
        echo "  - @naeemo/cdl-compiler"
        echo "  - @naeemo/cdl-renderer-echarts"
        echo "  - @naeemo/cdl-cli"
        echo "  - @naeemo/cdl-ai"
        echo "  - @naeemo/cdl-ssr"
        echo "  - @naeemo/cdl-react"
        echo "  - @naeemo/cdl-vue"
        echo "  - @naeemo/cdl-templates"
        echo "  - @naeemo/cdl-themes"
        echo "  - @naeemo/cdl-renderer-canvas"
        echo "  - @naeemo/cdl-renderer-d3"
        echo "  - @naeemo/cdl-vscode"
        echo "  - @naeemo/cdl-integration-test"
        echo ""
        echo "🚀 Installation:"
        echo "  npm install @naeemo/cdl-compiler @naeemo/cdl-renderer-echarts @naeemo/cdl-cli"
