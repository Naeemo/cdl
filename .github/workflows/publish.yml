name: Publish to NPM

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm install -g pnpm@8.14.1

    - name: Build and publish packages
      env:
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        # Set up npm auth
        echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

        # Do NOT run root pnpm install - it will try to fetch unpublished packages
        # Instead, install dependencies inside each package directory

        echo "Publishing CDL packages to NPM..."

        # ===== Stage 1: Core packages (no internal deps) =====
        echo "📦 Publishing @naeemo/cdl-compiler..."
        cd packages/compiler
        pnpm install
        pnpm run build
        pnpm publish --no-verify-access --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-renderer-echarts..."
        cd packages/renderer
        pnpm install
        pnpm run build
        pnpm publish --no-verify-access --access public
        cd ../..

        # ===== Stage 2: Packages that depend on core =====
        echo "📦 Publishing @naeemo/cdl-ai..."
        cd packages/ai
        pnpm install
        pnpm run build
        pnpm publish --no-verify-access --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-ssr..."
        cd packages/ssr
        pnpm install
        pnpm publish --no-verify-access --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-cli..."
        cd packages/cli
        pnpm install
        pnpm publish --no-verify-access --access public
        cd ../..

        # ===== Stage 3: Remaining packages =====
        echo "📦 Publishing @naeemo/cdl-react..."
        cd packages/react
        pnpm install
        pnpm run build
        pnpm publish --no-verify-access --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-vue..."
        cd packages/vue
        pnpm install
        pnpm run build
        pnpm publish --no-verify-access --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-templates..."
        cd packages/templates
        pnpm install
        pnpm publish --no-verify-access --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-themes..."
        cd packages/themes
        pnpm install
        pnpm run build
        pnpm publish --no-verify-access --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-renderer-canvas..."
        cd packages/renderer-canvas
        pnpm install
        pnpm publish --no-verify-access --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-renderer-d3..."
        cd packages/renderer-d3
        pnpm install
        pnpm run build
        pnpm publish --no-verify-access --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-vscode..."
        cd packages/vscode-extension
        pnpm install
        pnpm run build 2>/dev/null || echo "No build script, skipping"
        pnpm publish --no-verify-access --access public
        cd ../..

        echo "📦 Publishing @naeemo/cdl-integration-test..."
        cd packages/integration-test
        pnpm install
        pnpm publish --no-verify-access --access public
        cd ../..

        echo "✅ All packages published successfully!"

    - name: Create GitHub Release Comment
      if: github.event_name == 'release'
      run: |
        echo "🎉 CDL v${{ github.event.release.tag_name }} packages published to NPM!"
        echo ""
        echo "📦 Published packages:"
        echo "  - @naeemo/cdl-compiler"
        echo "  - @naeemo/cdl-renderer-echarts"
        echo "  - @naeemo/cdl-cli"
        echo "  - @naeemo/cdl-ai"
        echo "  - @naeemo/cdl-ssr"
        echo ""
        echo "🚀 Installation:"
        echo "  npm install @naeemo/cdl-compiler @naeemo/cdl-renderer-echarts @naeemo/cdl-cli"
        echo ""
        echo "📚 Documentation: https://naeemo.github.io/cdl/"