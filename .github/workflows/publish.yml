name: Publish to NPM

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'

    - name: Debug npm config
      run: |
        echo "NPM config:"
        npm config list
        echo ""
        echo "Trying npm whoami..."
        npm whoami || echo "whoami failed"
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Build and publish packages
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        echo "Publishing CDL packages to NPM..."

        publish_package() {
          local pkg_dir=$1
          local pkg_name=$2
          cd $pkg_dir
          local version=$(node -p "require('./package.json').version")
          local full_name="@naeemo/cdl-${pkg_name}"
          echo "📦 Checking $full_name@$version..."
          if npm view "$full_name@$version" version &>/dev/null; then
            echo "  ⚠️  $full_name@$version already exists, skipping"
          else
            echo "  🚀 Publishing $full_name@$version..."
            npm install
            npm run build 2>/dev/null || echo "  (no build script)"
            npm publish --access public
            echo "  ✅ Published $full_name@$version"
          fi
          cd ../..
        }

        # Stage 1: Core package (must publish first)
        publish_package "packages/core" "core"

        # Stage 2: Framework bindings
        publish_package "packages/react" "react"
        publish_package "packages/vue" "vue"

        # Stage 3: Additional packages
        publish_package "packages/ai" "ai"
        publish_package "packages/cli" "cli"
        publish_package "packages/ssr" "ssr"

        echo "✅ All packages processed!"

    - name: Create GitHub Release Comment
      if: github.event_name == 'release'
      run: |
        echo "🎉 CDL v${{ github.event.release.tag_name }} packages published to NPM!"
        echo ""
        echo "📦 Published packages:"
        echo "  - @naeemo/cdl-core"
        echo "  - @naeemo/cdl-react"
        echo "  - @naeemo/cdl-vue"
        echo "  - @naeemo/cdl-ai"
        echo "  - @naeemo/cdl-cli"
        echo "  - @naeemo/cdl-ssr"
        echo ""
        echo "🚀 Installation:"
        echo "  npm install @naeemo/cdl-core @naeemo/cdl-react"
        echo ""
        echo "📦 Package structure (v0.7):"
        echo "  - @naeemo/cdl-core: compiler + renderer + themes"
        echo "  - @naeemo/cdl-react: React components + dynamic charts"
        echo "  - @naeemo/cdl-vue: Vue components + dynamic charts"
